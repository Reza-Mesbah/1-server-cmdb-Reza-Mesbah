<IfModule mod_ssl.c>
<VirtualHost *:443>
    DocumentRoot /var/www/html
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

ServerName flashcards.reza-server.ilab.fi
Include /etc/letsencrypt/options-ssl-apache.conf
SSLCertificateFile /etc/letsencrypt/live/flashcards.reza-server.ilab.fi/fullchain.pem
SSLCertificateKeyFile /etc/letsencrypt/live/flashcards.reza-server.ilab.fi/privkey.pem
</VirtualHost>
</IfModule>
