<VirtualHost *:80>
    ServerName tips.rairuoho.ilab.fi
    ServerAlias tips.reza-server.ilab.fi reza-server.ilab.fi
    
    ProxyPreserveHost On
    ProxyPass /dbtips/ http://127.0.0.1:3000/
    ProxyPassReverse /dbtips/ http://127.0.0.1:3000/
    
    ErrorLog ${APACHE_LOG_DIR}/tips-error.log
    CustomLog ${APACHE_LOG_DIR}/tips-access.log combined
</VirtualHost>
