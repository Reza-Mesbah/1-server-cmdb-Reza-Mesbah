<VirtualHost *:443>
    ServerName tips.rairuoho.ilab.fi
    ServerAlias tips.reza-server.ilab.fi reza-server.ilab.fi
    
    SSLEngine on
    SSLCertificateFile /etc/ssl/tips/certificate.crt
    SSLCertificateKeyFile /etc/ssl/tips/private.key
    
    ProxyPreserveHost On
    ProxyPass /dbtips/ http://127.0.0.1:3000/
    ProxyPassReverse /dbtips/ http://127.0.0.1:3000/
    
    ErrorLog ${APACHE_LOG_DIR}/tips-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/tips-ssl-access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName tips.rairuoho.ilab.fi
    ServerAlias tips.reza-server.ilab.fi reza-server.ilab.fi
    
    ProxyPreserveHost On
    ProxyPass /dbtips/ http://127.0.0.1:3000/
    ProxyPassReverse /dbtips/ http://127.0.0.1:3000/
    
    ErrorLog ${APACHE_LOG_DIR}/tips-error.log
    CustomLog ${APACHE_LOG_DIR}/tips-access.log combined
</VirtualHost>
